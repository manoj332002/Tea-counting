<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Counter</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f3f0;
            color: #3e2723;
        }
        .counter-container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h1 { margin-top: 0; font-weight: 500; }
        .count-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 1rem 0;
            color: #8d6e63;
        }
        .btn {
            font-size: 1.1rem;
            padding: 0.8rem 1.8rem;
            margin: 0.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }
        .btn-add { background-color: #4caf50; color: white; }
        .btn-add:hover { background-color: #45a049; }
        .btn-reset { background-color: #e53935; color: white; }
        .btn-reset:hover { background-color: #d32f2f; }
    </style>
</head>
<body>

    <div class="counter-container">
        <h1>☕ Tea Counter</h1>
        <div class="count-display" id="count">0</div>
        <button class="btn btn-add" id="addBtn">+ Add Tea</button>
        <button class="btn btn-reset" id="resetBtn">Reset</button>
    </div>

    <script>
        const countDisplay = document.getElementById('count');
        const addBtn = document.getElementById('addBtn');
        const resetBtn = document.getElementById('resetBtn');

        let teaCount = localStorage.getItem('totalTeas') ? parseInt(localStorage.getItem('totalTeas')) : 0;
        countDisplay.textContent = teaCount;

        addBtn.addEventListener('click', () => {
            teaCount++;
            countDisplay.textContent = teaCount;
            localStorage.setItem('totalTeas', teaCount);
        });

        resetBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to reset your tea count?")) {
                teaCount = 0;
                countDisplay.textContent = teaCount;
                localStorage.removeItem('totalTeas');
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.error('Service Worker Registration Failed', err));
            });
        }
    </script>
</body>
</html>
